services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wapuugo_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wapuugo_db
    volumes:
      - ./plugins/wapuugo-core:/var/www/html/wp-content/plugins/wapuugo-core
      - wp_files:/var/www/html 
    depends_on:
      - db

  wp-cli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    volumes:
      - ./plugins/wapuugo-core:/var/www/html/wp-content/plugins/wapuugo-core
      - wp_files:/var/www/html
    user: root 
    command: >
      sh -c "
        export HTTP_HOST=localhost;
        sleep 5;
        rm -f wp-config.php;
        echo 'Czekanie na baze danych...';
        
        # Nowa pętla PHP - odporna na Fatal Errory
        php -r \"
          mysqli_report(MYSQLI_REPORT_OFF);
          while (!@mysqli_connect('db', 'wp_user', 'wp_password', 'wapuugo_db')) {
            sleep(3);
          }
        \";
        
        echo 'Tworzenie konfiguracji';
        wp config create --allow-root --dbname=wapuugo_db --dbuser=wp_user --dbpass=wp_password --dbhost=db --extra-php=\"define('MYSQL_CLIENT_FLAGS', 0);\" --force;

        # Dodatkowe sprawdzenie, czy plik na pewno powstał
        if [ -f wp-config.php ]; then
          if ! wp core is-installed --allow-root; then
            echo 'Instalowanie WordPressa';
            wp core install --allow-root --url=http://localhost:8080 --title='WapuuGo Adventure' --admin_user=admin --admin_password=admin123 --admin_email=kontakt@wapuugo.local --skip-email;
            
            echo 'Aktywacja wtyczki';
            wp plugin activate wapuugo-core --allow-root;
            echo '--- GOTOWE! Mozesz sie zalogowac (admin/admin123)---';
          else
            echo 'WordPress juz działa.';
          fi
        else
          echo 'BLAD: Nie udalo sie stworzyc wp-config.php!';
        fi
      "

volumes:
  db_data:
  wp_files: